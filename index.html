<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC84Hr1ud74JFr3HU_SoWHsqZt919TNsns",
    authDomain: "sifa-1a32c.firebaseapp.com",
    projectId: "sifa-1a32c",
    storageBucket: "sifa-1a32c.firebasestorage.app",
    messagingSenderId: "1023271372069",
    appId: "1:1023271372069:web:65319ad1172f46fa6906cc",
    measurementId: "G-ZY33FXCDE4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Global variables for the rest of the app
  window.firebaseApp = app;
  window.auth = auth;
  window.db = db;
  window.storage = storage;
  window.currentUser = null;
  window.fbOK = false;

  // Enable Firestore offline persistence
  enableIndexedDbPersistence(db)
    .then(() => console.log("%c✅ Firestore persistence enabled", "color: #22D3EE"))
    .catch((err) => console.warn("Firestore persistence warning:", err.message));

  // Auth state listener
  onAuthStateChanged(auth, (user) => {
    window.currentUser = user;
    if (user) {
      console.log("%c✅ User signed in:", user.uid, "color: #22D3EE; font-weight: bold");
      window.fbOK = true;
    } else {
      window.fbOK = false;
    }
  });

  console.log("%c✅ Firebase v10 Modular SDK initialized successfully", "color: #22D3EE; font-weight: bold");
</script>
